<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Form</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 12px;
}

tr:hover {
  background: #eee;
  cursor: pointer;
}

/* Spinner */
.overlay {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(255,255,255,0.7);
  justify-content:center;
  align-items:center;
}

.spinner {
  width:50px; height:50px;
  border:5px solid #007BFF;
  border-top:5px solid transparent;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: green;
  color: white;
  padding: 10px 20px;
  display: none;
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
</div>

<div class="container">

<h2>CRUD Form</h2>

<form id="form">
  <input type="hidden" id="rowId">

  <input name="name" placeholder="Name" required>
  <input name="email" placeholder="Email" required>
  <textarea name="message" placeholder="Message"></textarea>

  <button type="submit">Save</button>
  <button type="button" onclick="deleteData()">Delete</button>
</form>

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Message</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbykrp3v7aWou1xihbvHrEgE9LOO_FPQZS_GUlRCfsVux1ck4I2knz9hXIftHxy4LuWyvA/exec";

const form = document.getElementById("form");
const overlay = document.getElementById("overlay");
const toast = document.getElementById("toast");
const tableBody = document.querySelector("#table tbody");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const id = document.getElementById("rowId").value;

  const data = {
    action: id ? "update" : "create",
    id: id,
    name: form.name.value,
    email: form.email.value,
    message: form.message.value
  };

  sendData(data);
});

function deleteData() {
  const id = document.getElementById("rowId").value;
  if (!id) return showToast("Select row first", true);

  sendData({ action: "delete", id: id });
}

function sendData(data) {
  overlay.style.display = "flex";

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    form.reset();
    document.getElementById("rowId").value = "";
    showToast("Success!");
    loadData();
  })
  .catch(() => showToast("Error!", true))
  .finally(() => overlay.style.display = "none");
}

function loadData() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {
      tableBody.innerHTML = "";

      data.slice(1).forEach(row => {
        let tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td>${row[3]}</td>
        `;

        tr.onclick = () => editRow(row);
        tableBody.appendChild(tr);
      });
    });
}

function editRow(row) {
  document.getElementById("rowId").value = row[0];
  form.name.value = row[1];
  form.email.value = row[2];
  form.message.value = row[3];
}

function showToast(msg, error=false) {
  toast.innerText = msg;
  toast.style.background = error ? "red" : "green";
  toast.style.display = "block";

  setTimeout(() => toast.style.display = "none", 3000);
}

loadData();
</script>

</body>
</html>
