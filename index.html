<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login App</title>

<style>

/* GLOBAL FIX */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* LOGIN */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.login-box {
  background: white;
  padding: 30px 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 320px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  text-align: center;
}

.login-box h2 {
  margin-bottom: 20px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: #007BFF;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* ERROR */
.error {
  color: red;
  font-size: 13px;
  margin-top: 5px;
  min-height: 18px;
}

/* APP */
.app {
  display: none;
  height: 100vh;
}

.header {
  background: #007BFF;
  color: white;
  padding: 12px;
  text-align: center;
  position: sticky;
  top: 0;
}

.logout-btn {
  position: absolute;
  right: 15px;
  top: 10px;
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  color: white;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: calc(100vh - 50px);
  border: none;
}

/* MOBILE */
@media (max-width: 400px) {
  .login-box {
    padding: 25px 18px;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <div class="error" id="error"></div>

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="appPage">
  <div class="header">
   
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <iframe src="https://script.google.com/macros/s/AKfycbxKxotkwOLBphotsR9tBT2XGLYlvA_cIAz4Ycl0w4JTLeKRLa0ELBlUoEmChh-KINNDcw/exec"></iframe>
</div>

<script>
// CHANGE LOGIN DETAILS
const USER = "admin";
const PASS = "1234";

// AUTO LOGIN
window.onload = function() {
  if (localStorage.getItem("loggedIn") === "true") {
    showApp();
  }
};

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u === USER && p === PASS) {
    localStorage.setItem("loggedIn", "true");
    showApp();
  } else {
    document.getElementById("error").innerText = "Invalid username or password";
  }
}

function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appPage").style.display = "block";
}

function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}
</script>

</body>
</html>
