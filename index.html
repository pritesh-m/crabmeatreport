<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrabMeat Report</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    /* HEADER */
    .header {
      background: #007BFF;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* IFRAME CONTAINER */
    .iframe-container {
      width: 100%;
      height: calc(100vh - 50px); /* full height minus header */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 600px) {
      .header {
        font-size: 16px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>



<div class="iframe-container">
  <iframe 
    src="https://script.google.com/macros/s/AKfycbzH6IKL_G4oWY1HXH_M9Ymzpt79yeH3lM22xKa78zY9d1uCJeN9uNItWM06vMCAncdlMA/exec"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
